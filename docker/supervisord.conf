[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

; ========== etcd（优先级最高，最先启动）==========
[program:etcd]
command=/usr/local/bin/etcd
    --name=apisix-etcd
    --data-dir=/data/etcd
    --listen-client-urls=http://0.0.0.0:2379
    --advertise-client-urls=http://0.0.0.0:2379
    --listen-peer-urls=http://0.0.0.0:2380
    --initial-advertise-peer-urls=http://0.0.0.0:2380
    --initial-cluster=apisix-etcd=http://0.0.0.0:2380
    --initial-cluster-token=apisix-etcd-cluster
    --initial-cluster-state=new
priority=10
autostart=true
autorestart=true
startsecs=3
startretries=3
stdout_logfile=/var/log/supervisor/etcd-stdout.log
stderr_logfile=/var/log/supervisor/etcd-stderr.log

; ========== APISIX（等 etcd 就绪后启动）==========
[program:apisix]
command=/usr/local/openresty/bin/openresty -p /usr/local/apisix -g "daemon off;"
priority=20
autostart=true
autorestart=true
startsecs=5
startretries=5
stdout_logfile=/var/log/supervisor/apisix-stdout.log
stderr_logfile=/var/log/supervisor/apisix-stderr.log

; ========== isrvd ==========
[program:isrvd]
command=/usr/local/bin/isrvd
environment=CONFIG_PATH="/data/conf/isrvd.yml"
directory=/data/storage
priority=30
autostart=true
autorestart=true
startsecs=3
startretries=5
stdout_logfile=/var/log/supervisor/isrvd-stdout.log
stderr_logfile=/var/log/supervisor/isrvd-stderr.log
