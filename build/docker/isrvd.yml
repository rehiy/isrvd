server:
  debug: false
  listenAddr: :8080
  jwtSecret: __JWT_SECRET__
  rootDirectory: /data/

agent:
  model: your-model
  baseUrl: https://ai.rehiy.wang/v1
  apiKey: your-api-key

apisix:
  adminUrl: http://127.0.0.1:9180/apisix/admin
  adminKey: __APISIX_ADMIN_KEY__

docker:
  host: unix:///var/run/docker.sock
  containerRoot: container/
  registries:
     # - name: Company Hub
     #   description: 公司内部镜像仓库
     #   url: hub.example.com
     #   username: debug
     #   password: 123

marketplace:
  url: https://apps.rehi.org

links:
- label: 工具箱
  url: https://api.rehi.org
  icon: fas fa-cloud-bolt

members:
  - username: admin
    password: __ISRVD_PASSWORD__
    homeDirectory: .
    permissions:
      filer: rw
      agent: rw
      apisix: rw
      docker: rw
      swarm: rw
      compose: rw
      system: rw
      shell: rw

# etcd 配置（可选）
# 启用后，members / links / marketplace / registries / agent / jwtSecret / proxyHeaderName / adminKey
# 等全局配置将存储在 etcd 中，多实例自动同步
# etcd:
#   endpoints:
#     - http://127.0.0.1:2379
#   prefix: /isrvd          # 默认 /isrvd
#   username: ""
#   password: ""
#   tls:
#     certFile: ""
#     keyFile: ""
#     caFile: ""
