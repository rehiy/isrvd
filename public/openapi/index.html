<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iSrvd API 文档</title>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <!-- Scalar API Reference -->
    <script id="api-reference"></script>
    
    <script>
      var configuration = {
        url: './data.json',
        'theme': 'purple',
        'layout': 'modern',
        'defaultHttpClient': {
          targetKey: 'shell',
          clientKey: 'curl'
        },
        'hideModels': false,
        'showSidebar': true,
        'searchHotKey': 'k',
        'hideClientButton': true  // 隐藏 API Client 按钮
      }
      
      document.getElementById('api-reference').dataset.configuration = JSON.stringify(configuration)
    </script>
    
    <!-- Scalar CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  </body>
</html>
