$:
  tag_push:
    - name: iSrvd Release
      if: echo "$CNB_BRANCH" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'
      runner:
        tags: cnb:arch:amd64
        cpus: 4
      docker:
        image: golang:1.25-bookworm
        volumes:
          - /go/pkg/mod
          - /root/.cache/go-build
          - /root/.npm
      services:
        - name: docker
          options:
            rootlessBuildkitd:
              enabled: true
      env:
        IMAGE_URL: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}
        ISRVD_DOWNLOAD_BASE: ${CNB_WEB_ENDPOINT}/${CNB_REPO_SLUG}/-/releases/download

      stages:
        - name: Setup Node.js 24
          timeout: 20m
          script:
            - apt-get update
            - apt-get install -y --no-install-recommends ca-certificates curl git gnupg
            - curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
            - apt-get install -y --no-install-recommends nodejs
            - git fetch --unshallow --tags --force --prune || git fetch --tags --force --prune

        - name: Build binary packages
          timeout: 2h
          script: sh build.sh

        - name: Check release notes
          script:
            - test -s RELEASE.md || echo "- Release $CNB_BRANCH" > RELEASE.md
            - cat RELEASE.md

        - name: Create CNB release
          type: git:release
          options:
            tag: $CNB_BRANCH
            title: $CNB_BRANCH
            descriptionFromFile: ./RELEASE.md
            latest: true

        - name: Upload binary attachments
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/*

        - name: Login to CNB Docker registry
          script: printf "%s" "$CNB_TOKEN" | docker login -u "$CNB_TOKEN_USER_NAME" --password-stdin "$CNB_DOCKER_REGISTRY"

        - name: Build and push slim image
          timeout: 2h
          script: |
            docker buildx build --push --platform linux/amd64,linux/arm64 \
            --build-arg "ISRVD_VERSION=$CNB_BRANCH" --build-arg "ISRVD_DOWNLOAD_BASE=$ISRVD_DOWNLOAD_BASE" \
            -t $IMAGE_URL:slim -t $IMAGE_URL:latest -f build/docker-slim/Dockerfile .

        - name: Build and push apisix image
          timeout: 2h
          script: |
            docker buildx build --push --platform linux/amd64,linux/arm64 \
            --build-arg "ISRVD_VERSION=$CNB_BRANCH" --build-arg "ISRVD_DOWNLOAD_BASE=$ISRVD_DOWNLOAD_BASE" \
            -t $IMAGE_URL:apisix -f build/docker/Dockerfile .

        - name: Build and push caddy image
          timeout: 2h
          script: |
            docker buildx build --push --platform linux/amd64,linux/arm64 \
            --build-arg "ISRVD_VERSION=$CNB_BRANCH" --build-arg "ISRVD_DOWNLOAD_BASE=$ISRVD_DOWNLOAD_BASE" \
            -t $IMAGE_URL:caddy -f build/docker-caddy/Dockerfile .
