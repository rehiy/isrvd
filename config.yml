server:
  debug: false
  listenAddr: :8080
  jwtSecret: your-jwt-secret  # JWT 签名密钥，修改后所有用户需重新登录
  jwtExpiration: 86400        # JWT 有效期（秒），默认 86400（24小时）
  maxUploadSize: 104857600    # 文件上传最大字节数，默认 104857600（100MB）
  allowedOrigins: []          # 允许的跨域 Origin，支持通配符 *
  rootDirectory: /srv/data

tha:
  enabled: false                # 是否启用代理 Header 登录
  headerName: X-Username        # 上游代理传入登录用户名的 Header 名称
  trustedCIDRs: [127.0.0.1/32]  # 允许传入登录 Header 的代理来源 CIDR；为空时不限制来源

oidc:
  enabled: false                                        # 是否启用 OIDC 认证
  issuerUrl: https://idp.example.com                    # OIDC 发行方 URL
  clientId: isrvd                                       # OIDC 客户端 ID
  clientSecret: your-client-secret                      # OIDC 客户端密钥
  redirectUrl: https://isrvd/api/account/oidc/callback  # OIDC 重定向 URL
  usernameClaim: sub                                    # OIDC 用户名声明字段
  scopes: [openid, profile, email]                      # OIDC 请求的作用域
  loginLabel: ""                                        # OIDC 登录按钮显示文本，为空时使用默认值

passkey:
  enabled: false                  # 是否启用 Passkey 认证
  rpName: "iSrvd"                 # Relying Party 名称，如 "My App"
  rpId: "localhost"               # Relying Party ID（通常是域名）
  rpOrigins:                      # 允许的 Origin 列表
    - "http://localhost:8080"
  timeout: 60000                  # 超时时间（毫秒），默认 60000（60 秒）

agent:
