server:
  debug: false
  listenAddr: :8080
  # jwtSecret: your-jwt-secret         # JWT 签名密钥，修改后所有用户需重新登录
  # jwtExpiration: 86400               # JWT 有效期（秒），默认 86400（24小时）
  # maxUploadSize: 104857600           # 文件上传最大字节数，默认 104857600（100MB）
  # allowedOrigins: [https://example.com]  # 允许的跨域 Origin，支持通配符 *
  # proxyHeaderName: X-Username        # 内网代理认证 Header，留空禁用
  # proxyTrustedCIDRs: [127.0.0.1/32]  # 代理认证可信来源 CIDR，为空时仅信任本机
  rootDirectory: /srv/data

oidc:
  enabled: false
  # 元数据（authorization_endpoint、token_endpoint、jwks_uri 等）由 issuerUrl 自动发现
  # issuerUrl: https://idp.example.com
  # clientId: isrvd
  # clientSecret: your-client-secret
  # redirectUrl: https://isrvd.example.com/api/account/oidc/callback
  # usernameClaim: sub（默认值，稳定且不可复用；如使用 email 需确保 IdP 已验证邮箱）
  # scopes: [openid, profile, email]（默认值，openid 始终被自动包含）
  # loginButtonLabel: 使用 OIDC 登录（默认值，自定义 OIDC 登录按钮显示名称）

agent:
  # model: your-model
  # baseUrl: https://ai.rehiy.wang/v1
  # apiKey: your-api-key

apisix:
  # adminUrl: http://127.0.0.1:9180
  # adminKey: your-admin-key

caddy:
  # adminUrl: http://127.0.0.1:2019    # Caddy Admin API 地址，默认 127.0.0.1:2019

docker:
  # host: unix:///var/run/docker.sock
  # host: tcp://127.0.0.1:2375
  containerRoot: container/
  registries:
     # - name: Company Hub
     #   description: 公司内部镜像仓库
     #   url: hub.example.com
     #   username: debug
     #   password: 123

marketplace:
  url: https://apps.rehi.org

links:
- label: 工具箱
  url: https://api.rehi.org
  icon: fas fa-cloud-bolt

members:
  - username: admin
    password: admin
    homeDirectory: .
    founder: true

  - username: user1
    password: password1
    homeDirectory: member/user1/
    # permissions 未配置则所有路由无权限
    # 格式："METHOD /api/path"，如 "GET /api/docker/containers"
    permissions:
      - GET /api/overview/status
      - GET /api/docker/containers
      - GET /api/docker/container/:id
